<!DOCTYPE html>
<html>
<head>
    <title>DocuGlass AI</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            padding: 50px;
        }

        .card {
            background: rgba(255,255,255,0.7);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            width: 400px;
            margin: auto;
        }

        button {
            background: #2575fc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #6a11cb;
        }

        #result {
            white-space: pre-wrap;
            text-align: left;
            margin-top: 20px;
            max-height: 300px;
            overflow: auto;
        }

        .loader {
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>✨ DocuGlass AI</h2>
        <p>Upload document to extract text</p>

        <input type="file" id="file"><br><br>
        <button onclick="upload()">Analyze</button>

        <p class="loader" id="loader">⏳ Processing...</p>

        <pre id="result"></pre>
    </div>

    <script>
        async function upload() {
            const fileInput = document.getElementById("file");
            const loader = document.getElementById("loader");
            const resultBox = document.getElementById("result");

            if (!fileInput.files.length) {
                alert("Please select a file");
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            loader.style.display = "block";
            resultBox.innerText = "";

            try {
                const res = await fetch("/analyze", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                if (data.error) {
                    resultBox.innerText = "❌ " + data.error;
                } else {
                    resultBox.innerText = data.text;
                }

            } catch (err) {
                resultBox.innerText = "❌ Failed to connect to server";
            }

            loader.style.display = "none";
        }
    </script>

</body>
</html>
